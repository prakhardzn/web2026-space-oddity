<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03: Gallery</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="brief">
    <h1>03: Gallery</h1>
    <p>The HTML is done, but you have to write the CSS. Center the featured image in the area, both across and down the page, then lay the three thumbnails out as an even row beneath it. Match <code>goal.png</code>. There are TODOs in <code>style.css</code>.</p>
    <img class="goal" src="goal.png" alt="A large featured image centered in a band, with a row of three smaller images beneath it">
  </div>

  <section class="featured">
    <figure>
      <img src="images/wheat-field.jpg" alt="Wheat Field with Cypresses by Vincent van Gogh">
      <figcaption>Van Gogh, Wheat Field with Cypresses, 1889</figcaption>
    </figure>
  </section>

  <section class="thumbs">
    <figure>
      <img src="images/great-wave.jpg" alt="The Great Wave off Kanagawa by Hokusai">
      <figcaption>Hokusai, The Great Wave</figcaption>
    </figure>
    <figure>
      <img src="images/water-pitcher.jpg" alt="Young Woman with a Water Pitcher by Vermeer">
      <figcaption>Vermeer, Water Pitcher</figcaption>
    </figure>
    <figure>
      <img src="images/harvesters.jpg" alt="The Harvesters by Bruegel">
      <figcaption>Bruegel, The Harvesters</figcaption>
    </figure>
  </section>
</body>
</html>
